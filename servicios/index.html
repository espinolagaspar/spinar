<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Servicios — SPINAR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html,body{background:#050805;color:#fff;font-family:sans-serif;}
    .nav-link{color:#9ca3af;font-size:14px;text-decoration:none;}
    .nav-link:hover{color:#fff;}
    .btn-primary{background:linear-gradient(135deg,#166534,#22c55e);color:#fff;padding:10px 22px;border-radius:8px;font-size:14px;font-weight:500;border:none;cursor:pointer;text-decoration:none;display:inline-block;}
    .card{background:#0F1410;border:1px solid #1A211A;border-radius:14px;padding:36px;transition:border-color .25s;}
    .card:hover{border-color:#22c55e;}
  </style>
</head>
<body>
  <nav style="position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(5,8,5,.92);backdrop-filter:blur(12px);border-bottom:1px solid #1A211A;padding:0 40px;">
    <div style="display:flex;align-items:center;justify-content:space-between;height:72px;max-width:1200px;margin:0 auto;">
      <a href="/"><img src="/assets/images/logo.png" alt="Spinar" style="height:52px;object-fit:contain;" /></a>
      <div style="display:flex;gap:32px;align-items:center;">
        <a href="/servicios" class="nav-link">Servicios</a>
        <a href="/casos" class="nav-link">Casos</a>
        <a href="/empresa" class="nav-link">Empresa</a>
        <a href="/insights" class="nav-link">Insights</a>
        <a href="/contacto" class="btn-primary">Hablar con un experto</a>
      </div>
    </div>
  </nav>

  <main style="max-width:1200px;margin:0 auto;padding:140px 40px 100px;">
    <p style="font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#22c55e;margin-bottom:16px;">Lo que construimos</p>
    <h1 style="font-size:clamp(36px,4vw,56px);font-weight:700;margin-bottom:16px;">Servicios</h1>
    <p style="color:#9ca3af;font-size:17px;max-width:560px;line-height:1.7;margin-bottom:60px;">Desde un módulo hasta una plataforma completa. Trabajamos en el alcance que tu empresa necesita.</p>

    <div style="display:flex;flex-direction:column;gap:24px;" id="services-list"></div>
  </main>

  <script>
    const services = [
      { icon:'💻', title:'Desarrollo de Software', desc:'Aplicaciones web, plataformas internas y productos digitales construidos para tu negocio específico. Sin código genérico, sin plantillas. Cada línea de código existe porque tu negocio lo necesita.\n\nTrabajamos con arquitecturas modernas, priorizamos la mantenibilidad y entregamos código que tu equipo puede operar.', bullets:['Aplicaciones web y móviles','Plataformas internas y herramientas de gestión','APIs y microservicios','Sistemas de facturación, logística, RRHH y más'] },
      { icon:'🤖', title:'Automatización con IA', desc:'Automatizamos tareas repetitivas, flujos de aprobación y análisis de datos usando modelos de inteligencia artificial integrados en tus sistemas actuales.\n\nNo reemplazamos a tu equipo: liberamos su tiempo para lo que realmente importa.', bullets:['Automatización de procesos con LLMs','Clasificación y extracción de datos','Chatbots internos y asistentes empresariales','Integración con OpenAI, LangChain y modelos propios'] },
      { icon:'🔌', title:'Integración de Sistemas', desc:'Conectamos tu ERP, CRM, plataforma logística y herramientas de BI para que trabajen como un ecosistema único. La información fluye sin fricciones, sin exports manuales, sin errores de sincronización.', bullets:['Integración ERP / CRM','APIs REST y GraphQL','ETL y pipelines de datos','Webhooks y automatizaciones entre plataformas'] },
      { icon:'🗺️', title:'Consultoría Tecnológica', desc:'Auditamos tu arquitectura actual, identificamos los puntos de quiebre y diseñamos una hoja de ruta tecnológica alineada con tu estrategia de negocio. Primero entendemos, después recomendamos.', bullets:['Auditoría de sistemas y arquitectura','Roadmap tecnológico a 6-18 meses','Due diligence técnico','Evaluación de stack y deuda técnica'] },
      { icon:'📦', title:'Productos Digitales', desc:'Si tenés una idea de producto, la convertimos en realidad: desde el prototipo hasta el go-to-market, con equipo técnico dedicado que entiende tanto el negocio como la tecnología.', bullets:['MVP y prototipos rápidos','Producto completo con iteración continua','Estrategia de lanzamiento técnico','Equipo de desarrollo dedicado'] },
    ];
    const list = document.getElementById('services-list');
    services.forEach(s => {
      list.innerHTML += `
        <div class="card" style="display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start;">
          <div>
            <div style="font-size:36px;margin-bottom:16px;">${s.icon}</div>
            <h2 style="font-size:24px;font-weight:700;margin-bottom:16px;">${s.title}</h2>
            <p style="color:#9ca3af;font-size:14px;line-height:1.8;white-space:pre-line;">${s.desc}</p>
          </div>
          <div>
            <p style="font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#4b5563;margin-bottom:16px;">Incluye</p>
            <ul style="display:flex;flex-direction:column;gap:10px;">
              ${s.bullets.map(b => `<li style="display:flex;gap:10px;align-items:flex-start;color:#d1d5db;font-size:14px;"><span style="color:#22c55e;margin-top:2px;flex-shrink:0;">✓</span>${b}</li>`).join('')}
            </ul>
            <a href="/contacto" style="display:inline-block;margin-top:28px;color:#22c55e;font-size:14px;font-weight:500;text-decoration:none;">Consultar sobre este servicio →</a>
          </div>
        </div>`;
    });
  </script>
</body>
</html>
